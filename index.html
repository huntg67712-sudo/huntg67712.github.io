<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>It's Raining Cats!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #BFFFD9;
            --lavender: #E0D7FF;
            --pink: #FFD1DC;
            --cream: #FFF9F5;
            --text: #7D5BA6;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--pink);
            font-family: 'Fredoka One', cursive;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; touch-action: none;
        }

        #stage-wrapper {
            position: relative;
            width: 420px;
            height: 700px;
            background: var(--cream);
            border: 15px solid white;
            border-radius: 50px;
            box-shadow: 0 20px 0px #F4ACB7, 0 30px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            background: url('background.PNG') no-repeat center center;
            background-size: cover;
            display: none;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; text-align: center;
        }

        .kawaii-panel {
            background: white;
            padding: 40px 20px;
            border-radius: 40px;
            border: 6px solid var(--mint);
            width: 85%;
            box-shadow: 0 10px 0px var(--mint);
        }

        h1 { margin: 0; font-size: 34px; color: var(--text); line-height: 1.2; }
        p { color: #8E8E8E; font-size: 18px; margin: 15px 0; }
        
        button {
            background-color: #FF9AA2; border: none; padding: 18px 45px;
            font-size: 22px; border-radius: 50px; color: white;
            cursor: pointer; font-family: 'Fredoka One', cursive;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0px #FF747D;
            margin: 20px 0;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0px #FF747D; }

        #hud {
            position: absolute; top: 20px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; z-index: 5;
        }
        .hud-row {
            display: flex; justify-content: space-between; width: 85%;
            font-size: 20px; color: var(--text);
            background: rgba(255,255,255,0.8);
            padding: 8px 20px; border-radius: 25px;
        }
        #high-score-hud { color: #FFB347; font-size: 16px; margin-bottom: 5px; }

        #speed-alert {
            position: absolute; top: 40%; width: 100%;
            color: #FF85A1; font-size: 42px; text-align: center;
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
            text-shadow: 3px 3px 0px white;
        }
        .controls-hint { font-size: 14px; color: #A0A0A0; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="stage-wrapper">
        <div id="start-screen" class="ui-layer">
            <div class="kawaii-panel">
                <h1>It's Raining Cats! ✨</h1>
                <p>Catch the KITTIES!</p>
                <button id="start-btn">Start ✨</button>
                <div class="controls-hint">
                    📱 Tilt phone to move<br>
                    ⌨️ Use Arrow Keys or A / D<br>
                    💥 Avoid the fireworks!
                </div>
            </div>
        </div>

        <div id="game-container">
            <div id="hud">
                <div id="high-score-hud">🌟 Best Record: 0</div>
                <div class="hud-row">
                    <div>Score: <span id="score">0</span></div>
                    <div style="color: #FF85A1;">Miss: <span id="missed">0</span>/5</div>
                </div>
            </div>
            <div id="speed-alert">FASTER! 🎀</div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="game-over-screen" class="ui-layer" style="display: none;">
            <div class="kawaii-panel">
                <h1 id="over-title" style="color: #FF85A1;">Game Over!</h1>
                <p id="final-score" style="font-size: 26px; color: var(--text);">Final Score: 0</p>
                <button onclick="location.reload()">Try Again!</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const gameContainer = document.getElementById('game-container');
        const gameOverScreen = document.getElementById('game-over-screen');
        const speedAlert = document.getElementById('speed-alert');
        
        canvas.width = 420;
        canvas.height = 700;

        let score = 0, missed = 0, gameActive = false, tiltX = 0, entities = [], lastSpawn = 0;
        let baseSpeed = 2.5; 
        let highScore = localStorage.getItem('rainingCatsHighScore') || 0;
        document.getElementById('high-score-hud').innerText = `🌟 Best Record: ${highScore}`;

        // --- LOAD IMAGES ---
        const playerImg = new Image(); playerImg.src = 'basket.PNG';
        
        const catFiles = ['gray.PNG', 'mainecoon.PNG', 'black.PNG', 'orange.PNG', 'white.PNG'];
        const catImages = catFiles.map(file => {
            const img = new Image();
            img.src = file;
            return img;
        });

        const fireworkFiles = ['firework.PNG', 'firework1.PNG'];
        const fireworkImages = fireworkFiles.map(file => {
            const img = new Image();
            img.src = file;
            return img;
        });

        const player = { x: 175, y: 580, width: 80, height: 80, speed: 11 };

        const keys = { Left: false, Right: false };
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.Left = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.Right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.Left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.Right = false;
        });

        // --- TILT SENSOR LOGIC ---
        function handleOrientation(event) {
            if (event.gamma !== null) {
                tiltX = event.gamma * 0.7; // Sensitivity multiplier
            }
        }

        startBtn.addEventListener('click', async () => {
            // Permission request for iOS
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                } catch (err) { console.log(err); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            startScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            gameActive = true;
            requestAnimationFrame(gameLoop);
        });

        function spawn() {
            if (entities.length >= 6) return; 

            const isFirework = Math.random() < 0.20; 
            let selectedImg;

            if (isFirework) {
                selectedImg = fireworkImages[Math.floor(Math.random() * fireworkImages.length)];
            } else {
                selectedImg = catImages[Math.floor(Math.random() * catImages.length)];
            }

            entities.push({
                x: 30 + Math.random() * (canvas.width - 80),
                y: -70,
                size: 60,
                img: selectedImg,
                speed: baseSpeed + (Math.random() * 1.5),
                type: isFirework ? 'firework' : 'cat',
                rot: Math.random() * Math.PI * 2,
                rotSpd: (Math.random() - 0.5) * 0.04
            });
        }

        function endGame(reason) {
            gameActive = false;
            gameContainer.style.display = 'none';
            gameOverScreen.style.display = 'flex';
            document.getElementById('final-score').innerText = `Final Score: ${score}`;
            if (reason === 'firework') document.getElementById('over-title').innerText = "Boom! 💥";
            if (score > highScore) localStorage.setItem('rainingCatsHighScore', score);
        }

        function gameLoop(time) {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- IMPROVED MOVEMENT (Key + Tilt) ---
            if (keys.Left) player.x -= player.speed;
            else if (keys.Right) player.x += player.speed;
            else if (tiltX) player.x += tiltX; 

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // Draw Basket
            let floatY = Math.sin(time / 200) * 4;
            ctx.drawImage(playerImg, player.x, player.y + floatY, player.width, player.height);

            // Spawn
            let spawnInterval = Math.max(600, 2000 - (baseSpeed * 100));
            if (time - lastSpawn > spawnInterval) {
                spawn();
                lastSpawn = time;
            }

            // Update Items
            for (let i = entities.length - 1; i >= 0; i--) {
                const e = entities[i];
                e.y += e.speed;
                e.rot += e.rotSpd;

                ctx.save();
                ctx.translate(e.x + e.size/2, e.y + e.size/2);
                ctx.rotate(e.rot);
                ctx.drawImage(e.img, -e.size/2, -e.size/2, e.size, e.size);
                ctx.restore();

                // Hit Detection
                if (e.y + e.size > player.y + 20 && 
                    e.y < player.y + player.height &&
                    e.x + e.size > player.x + 5 && 
                    e.x < player.x + player.width - 5) {
                    
                    if (e.type === 'firework') {
                        endGame('firework');
                    } else {
                        score++;
                        document.getElementById('score').innerText = score;
                        if (score % 10 === 0) {
                            baseSpeed += 0.5;
                            speedAlert.style.opacity = "1";
                            setTimeout(() => speedAlert.style.opacity = "0", 1200);
                        }
                        entities.splice(i, 1);
                    }
                    continue;
                }

                if (e.y > canvas.height) {
                    if (e.type === 'cat') {
                        missed++;
                        document.getElementById('missed').innerText = missed;
                        if (missed >= 5) endGame('missed');
                    }
                    entities.splice(i, 1);
                }
            }
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
